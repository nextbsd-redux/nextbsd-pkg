name: NextBSD packages

# Assembles versioned pkg(8) packages from the component repos' `continuous`
# artifacts and publishes a FLAT pkg repository to per-arch release tags
# (continuous-amd64 / continuous-arm64). pkg(8) only runs on FreeBSD, so the
# packaging happens inside a FreeBSD VM (vmactions); the Linux runner does the
# cross-repo downloads (public repos -> GITHUB_TOKEN) and the release upload.
#
# Trigger model (maintainer decision): nextbsd-userland's publish is the SINGLE
# auto producer (repository_dispatch: userland-updated). workflow_dispatch is the
# manual escape hatch to repackage on a kernel/kext-only change. pull_request
# builds the packages but never publishes.
#
# arm64 ships base + kernel + userland; kernel-extensions is amd64-only until the
# arm64 kext build path exists (build.sh skips it when no kexts are present).

on:
  repository_dispatch:
    types: [userland-updated]
  workflow_dispatch:
  pull_request:
    paths: ['scripts/**', 'manifests/**', '.github/workflows/build.yml']

permissions:
  contents: write

jobs:
  package:
    name: package (${{ matrix.arch }})
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        arch: [amd64, arm64]
    steps:
      - uses: actions/checkout@v4

      - name: Download component artifacts (${{ matrix.arch }}, public repos)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ARCH: ${{ matrix.arch }}
        run: |
          mkdir -p art
          gh release download continuous -R nextbsd-redux/nextbsd-freebsd-compat \
            --pattern "nextbsd-base-${ARCH}.tar.gz" --dir art --clobber
          gh release download continuous -R nextbsd-redux/nextbsd-kernel \
            --pattern "nextbsd-kernel-${ARCH}.tar.gz" --dir art --clobber
          gh release download continuous -R nextbsd-redux/nextbsd-userland \
            --pattern "nextbsd-userland-${ARCH}.tar.gz" --dir art --clobber
          # kexts are amd64-only builds today
          if [ "$ARCH" = amd64 ]; then
            gh release download continuous -R nextbsd-redux/nextbsd-kernel-modules \
              --pattern '*kext*.tar.gz' --dir art --clobber || true
          fi
          ls -lh art/

      - name: Build packages + flat repo, then install-test (FreeBSD VM)
        uses: vmactions/freebsd-vm@v1
        with:
          # FreeBSD 15.1 so the VM's native pkg ABI is FreeBSD:15 — matching the
          # packages, which lets install-test.sh's `pkg -r ... update/install`
          # accept the repo (a 14.x VM rejects FreeBSD:15 packages as "wrong
          # architecture" even with ABI pinned). This is the same release the ISO
          # builders (nextbsd/build.sh, gershwin-on-nextbsd) use. pkg create/repo
          # in build.sh are version-agnostic, so packaging is unaffected.
          release: "15.1"
          usesh: true
          copyback: true
          prepare: pkg bootstrap -y || true
          run: |
            set -e
            # build.sh assembles the flat repo and runs Layer A (check-ownership.sh)
            # before cataloging. install-test.sh is Layer B: it really installs
            # NextBSD-everything into a scratch root here, BEFORE the publish step
            # below, so a repo that can't install itself fails CI instead of
            # shipping (nextbsd#370). Both run on PRs too (publish does not).
            ARCH=${{ matrix.arch }} sh scripts/build.sh
            ARCH=${{ matrix.arch }} sh scripts/install-test.sh

      - name: Publish flat repo to continuous-${{ matrix.arch }}
        if: github.event_name != 'pull_request'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: continuous-${{ matrix.arch }}
        run: |
          R=nextbsd-redux/nextbsd-pkg
          gh release view "$TAG" -R "$R" >/dev/null 2>&1 \
            || gh release create "$TAG" -R "$R" \
                 --prerelease --title "NextBSD packages — ${{ matrix.arch }} (rolling)" \
                 --notes "Flat pkg(8) repository. Configure pkg with a NextBSD.conf pointing at this tag's download URL."
          # Safe publish order so a concurrent `pkg update` never sees a broken repo,
          # and so stale timestamp-versioned .pkg files don't accumulate on the release:
          #   1. upload the packages first
          #   2. upload the catalog LAST (so it only ever references packages already present)
          #   3. prune any NextBSD-*.pkg asset that isn't part of this snapshot
          echo "== 1. upload packages =="
          gh release upload "$TAG" -R "$R" out/repo/NextBSD-*.pkg --clobber
          echo "== 2. upload catalog (last) =="
          gh release upload "$TAG" -R "$R" out/repo/meta* out/repo/packagesite* out/repo/data* --clobber
          echo "== 3. prune stale package assets =="
          keep=$(cd out/repo && ls NextBSD-*.pkg)
          for a in $(gh release view "$TAG" -R "$R" --json assets -q '.assets[].name' | grep -E '^NextBSD-.*\.pkg$'); do
            if printf '%s\n' "$keep" | grep -qx "$a"; then
              :
            else
              echo "  prune: $a"
              gh release delete-asset "$TAG" "$a" -R "$R" --yes
            fi
          done
          echo "Published (${{ matrix.arch }}) — release assets now:"
          gh release view "$TAG" -R "$R" --json assets -q '.assets[].name' | sort

  verify:
    name: verify (${{ matrix.arch }})
    needs: package
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        arch: [amd64, arm64]
    steps:
      - uses: actions/checkout@v4
      - name: pkg update + resolve NextBSD-everything (FreeBSD VM)
        uses: vmactions/freebsd-vm@v1
        with:
          release: "14.2"
          usesh: true
          prepare: pkg bootstrap -y || true
          run: |
            ARCH=${{ matrix.arch }} sh scripts/verify.sh
